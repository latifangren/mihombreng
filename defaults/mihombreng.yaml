version: "1.2.0"
environment: production
server:
  port: "7777"
  host: 0.0.0.0
  mode: release
mihomo:
  core_path: /usr/bin/mihomo
  config_path: /etc/mihombreng/configs/config.yaml
  working_dir: /etc/mihombreng
  auto_restart: true
  auto_start: true
  log_file: /var/log/mihomo.log
  routing:
    tcp: tun
    udp: tun
    tun_device: ""
logging:
  level: info
  file: /var/log/mihombreng.log
  max_size: 100
  max_backups: 3
  max_age: 28
api:
  rate_limit: 100
  timeout: 30
  enable_swagger: false
  auth_token: ""
  cors:
    enabled: true
    allowed_origins:
    - http://localhost:7777
    - http://localhost:3333
    - http://127.0.0.1:7777
    allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allowed_headers:
    - Content-Type
    - Authorization
    - X-Requested-With
    expose_headers:
    - Content-Length
    allow_credentials: true
    max_age: 3600
