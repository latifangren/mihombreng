name: Build OpenWrt Packages

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - 'deploy/openwrt/**'
      - 'scripts/build-openwrt.sh'
      - 'backend/**'
      - 'web/**'
      - 'defaults/**'
  pull_request:
    branches: [dev, main]
    paths:
      - 'deploy/openwrt/**'
      - 'scripts/build-openwrt.sh'
      - 'backend/**'
      - 'web/**'
      - 'defaults/**'

jobs:
  smoke_build:
    name: smoke build (${{ matrix.arch }}, ${{ matrix.branch }})
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64]
        branch: [openwrt-24.10]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Setup Feed Structure
        run: |
          # Feed structure: packages at root level (action mounts workspace as /feed)
          mkdir -p mihombreng luci-app-mihombreng
          cp -f deploy/openwrt/mihombreng/Makefile mihombreng/
          cp -rf defaults/* mihombreng/
          cp -f deploy/openwrt/luci-app-mihombreng/Makefile luci-app-mihombreng/
          cp -rf deploy/openwrt/luci-app-mihombreng/root luci-app-mihombreng/

      - name: Build Packages
        uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: mihombreng
          PACKAGES: mihombreng luci-app-mihombreng
          NO_SHFMT_CHECK: 1
          SMOKE_BUILD: 1

      - name: Organize Artifacts
        run: |
          mkdir -p output
          find bin/packages -name "mihombreng_*.ipk" -exec cp {} output/ \;
          find bin/packages -name "luci-app-mihombreng_*.ipk" -exec cp {} output/ \; 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-smoke-${{ matrix.arch }}-${{ matrix.branch }}
          path: output/
          retention-days: 14

  full_build:
    name: full build (${{ matrix.arch }}, ${{ matrix.branch }})
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64_generic, arm_cortex-a7, mips_24kc]
        branch: [openwrt-24.10, openwrt-25.12]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Setup Feed Structure
        run: |
          # Feed structure: packages at root level (action mounts workspace as /feed)
          mkdir -p mihombreng luci-app-mihombreng
          cp -f deploy/openwrt/mihombreng/Makefile mihombreng/
          cp -rf defaults/* mihombreng/
          cp -f deploy/openwrt/luci-app-mihombreng/Makefile luci-app-mihombreng/
          cp -rf deploy/openwrt/luci-app-mihombreng/root luci-app-mihombreng/

      - name: Build Packages
        uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: mihombreng
          PACKAGES: mihombreng luci-app-mihombreng
          NO_SHFMT_CHECK: 1
          KEY_BUILD: ${{ secrets.SIGNING_KEY_SEC }}
          BUILD_LOG: 1
          V: ${{ matrix.branch == 'openwrt-25.12' && 's' || '' }}
          MAKEFLAGS: ${{ matrix.branch == 'openwrt-25.12' && '-j1' || '' }}

      - name: Organize Artifacts
        run: |
          mkdir -p output
          if [[ "${{ matrix.branch }}" == "openwrt-24.10" ]]; then
            find bin/packages -name "mihombreng_*.ipk" -exec cp {} output/ \;
            find bin/packages -name "luci-app-mihombreng_*.ipk" -exec cp {} output/ \; 2>/dev/null || true
          else
            find bin/packages -name "mihombreng-*.apk" ! -name "luci-app-*" -exec cp {} output/ \;
            find bin/packages -name "luci-app-mihombreng-*.apk" -exec cp {} output/ \; 2>/dev/null || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-full-${{ matrix.arch }}-${{ matrix.branch }}
          path: output/
          retention-days: 30

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version:' defaults/mihombreng.yaml | awk '{print $2}' | tr -d '"')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
