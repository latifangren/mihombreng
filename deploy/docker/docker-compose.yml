services:
  mihombreng:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MIHOMO_VERSION: v1.19.29
    image: mihombreng:latest
    container_name: mihombreng
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../../defaults/mihombreng.yaml:/etc/mihombreng/mihombreng.yaml:ro
      - mihombreng-logs:/var/log
    environment:
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7777/api/v1/app/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mihombreng-logs:
