services:
  mihombreng-dev:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      args:
        MIHOMO_VERSION: v1.19.29
    image: mihombreng:dev
    container_name: mihombreng-dev
    restart: unless-stopped
    ports:
      - "7777:7777"
      - "9090:9090"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../../defaults:/etc/mihombreng
      - ../../backend/bin/mihombreng-linux-amd64:/usr/share/mihombreng/mihombreng
      - ../../backend/configs/mihombreng.yaml:/etc/mihombreng/mihombreng.yaml
      - dev-logs:/var/log
    environment:
      - TZ=Asia/Jakarta
      - LOG_LEVEL=debug
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7777/api/v1/app/config"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  dev-logs:
