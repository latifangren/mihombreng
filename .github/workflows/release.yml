name: Auto Release on Version Bump
on:
  push:
    branches:
      - main      # Triggers on push/merge to main branch
    paths:
      - 'defaults/mihombreng.yaml'

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version:' defaults/mihombreng.yaml | awk '{print $2}' | tr -d '"')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target tag: v$VERSION"

      - name: Check if Release Exists
        id: check_release
        run: |
          TAG_NAME="v${{ steps.get_version.outputs.VERSION }}"
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME")
          if [ "$STATUS_CODE" = "200" ]; then
            echo "Release $TAG_NAME already exists. Skipping build."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG_NAME does not exist. Proceeding with build."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install System Dependencies
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip tar zstd sed

      - name: Install Swag CLI
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download GeoIP & DB Assets
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make download-assets

      - name: Build Multi-Arch Binaries
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make build-core

      - name: Build Packages (Deb & Arch)
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make all

      - name: Prepare Release Artifacts
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          mkdir -p release-dist
          cp backend/bin/* release-dist/
          cp build/*.deb release-dist/ || true
          cp build/*.pkg.tar.zst release-dist/ || true

      - name: Create GitHub Release and Push Tag
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          files: release-dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
