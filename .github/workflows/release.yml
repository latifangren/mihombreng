name: Auto Release on Version Bump
on:
  push:
    branches:
      - main      # Triggers on push/merge to main branch
    paths:
      - 'defaults/mihombreng.yaml'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force release even if version exists'
        required: false
        default: 'false'

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep -m 1 '^version:' defaults/mihombreng.yaml | awk '{print $2}' | tr -d '"')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Target tag: v$VERSION"

      - name: Check if Release Exists
        id: check_release
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force option enabled. Proceeding with build regardless of tag status."
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          else
            TAG_NAME="v${{ steps.get_version.outputs.VERSION }}"
            STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME")
            if [ "$STATUS_CODE" = "200" ]; then
              echo "Release $TAG_NAME already exists. Skipping build."
              echo "EXISTS=true" >> $GITHUB_OUTPUT
            else
              echo "Release $TAG_NAME does not exist. Proceeding with build."
              echo "EXISTS=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Set up Go
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install System Dependencies
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip tar zstd sed

      - name: Install Swag CLI
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Download GeoIP & DB Assets
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make download-assets

      - name: Build Multi-Arch Binaries
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make build-core

      - name: Build Packages (Deb & Arch)
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          make all

      - name: Prepare Release Artifacts
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          mkdir -p release-dist
          cp backend/bin/* release-dist/
          cp build/*.deb release-dist/ || true
          cp build/*.pkg.tar.zst release-dist/ || true

      - name: Prepare Release Notes
        if: steps.check_release.outputs.EXISTS == 'false'
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          # Find start line of the current version section in CHANGELOG.md
          START_LINE=$(grep -n "^## \[$VERSION\]" CHANGELOG.md | cut -d: -f1)
          
          if [ -n "$START_LINE" ]; then
            # Find the next version header line after START_LINE
            NEXT_HEADER_RELATIVE=$(tail -n +$((START_LINE + 1)) CHANGELOG.md | grep -n "^## \[" | head -n 1 | cut -d: -f1)
            
            if [ -n "$NEXT_HEADER_RELATIVE" ]; then
              END_LINE=$((START_LINE + NEXT_HEADER_RELATIVE - 1))
              # Extract lines between start and end of this version's changelog section
              sed -n "${START_LINE},${END_LINE}p" CHANGELOG.md > parsed_notes.md
            else
              # Extract from START_LINE to end of file if no older versions exist
              sed -n "${START_LINE},\$p" CHANGELOG.md > parsed_notes.md
            fi
            
            # Remove the version title line (first line)
            sed -i '1d' parsed_notes.md
            # Clean up leading empty lines
            sed -i '/./,$!d' parsed_notes.md
          else
            echo "No specific changelog entries found for version $VERSION." > parsed_notes.md
          fi
          
          cat << 'EOF' > release_body.md
          ## 📦 Package Distribution Details

          Get pre-built application packages and components for your platform:

          ### 🌐 OpenWrt Router
          * **OpenWrt 24.10 (`.ipk`)**: `mihombreng_<version>_<arch>.ipk`
          * **OpenWrt 25.12 (`.apk`)**: `mihombreng-<version>-<arch>.apk`
          * **Web UI (LuCI Companion)**: `luci-app-mihombreng_<version>_all.ipk` / `luci-app-mihombreng-<version>-all.apk` (Installs UI side panel inside the OpenWrt LuCI administration dashboard interface)

          ### 🐧 Linux Systems
          * **Debian / Ubuntu (`.deb`)**: `mihombreng_<version>-1_<arch>.deb`
          * **Arch Linux (`.pkg.tar.zst`)**: `mihombreng-<version>-1-<arch>.pkg.tar.zst`
          * **Standalone Core**: Direct standalone Go compiled binary executable files (`mihombreng-linux-<arch>`)

          ---

          ## 🚀 Changelog
          
          EOF
          
          cat parsed_notes.md >> release_body.md
          
          # Output to GHA step outputs for release body
          {
            echo "body<<EOF"
            cat release_body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Push Tag
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.body }}
          files: release-dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
