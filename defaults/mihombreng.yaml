version: "1.2.3"
environment: production
server:
  port: "7777"
  host: 0.0.0.0
  mode: release
mihomo:
  core_path: /usr/bin/mihomo
  config_path: /etc/mihombreng/configs/config.yaml
  working_dir: /etc/mihombreng
  auto_restart: true
  auto_start: true
  log_file: /var/log/mihomo.log
  routing:
    tcp: tun
    udp: tun
    tun_device: ""
    bypass_macs: []
    bypass_ips: []
    bypass_ip6s: []
logging:
  level: info
  file: /var/log/mihombreng.log
  max_size: 100
  max_backups: 3
  max_age: 28
api:
  rate_limit: 100
  timeout: 30
  enable_swagger: false
  auth_token: ""
  cors:
    enabled: true
    allowed_origins:
    - http://localhost:7777
    - http://localhost:3333
    - http://127.0.0.1:7777
    allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allowed_headers:
    - Content-Type
    - Authorization
    - X-Requested-With
    expose_headers:
    - Content-Length
    allow_credentials: true
    max_age: 3600

backup:
  auto_backup_enabled: true
  max_backups: 10
  max_age_days: 30
  backup_dir: "/etc/mihombreng/backups"
  targets:
    - name: "Nextcloud WebDAV"
      type: "webdav"
      url: "https://nextcloud.example.com/remote.php/dav/files/username/backups"
      username: "user"
      password: "password"
      enabled: false

